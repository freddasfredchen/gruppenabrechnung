name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_APP_PW_HASH: ${{ secrets.VITE_APP_PW_HASH }}
          VITE_LIST_ADM_HASH: ${{ secrets.VITE_LIST_ADM_HASH }}
          VITE_VORSTAND_HASH: ${{ secrets.VITE_VORSTAND_HASH }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRUPPENABRECHNUNG }}
          projectId: gruppenabrechnung
