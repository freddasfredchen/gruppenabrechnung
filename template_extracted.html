<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           oklch(0.985 0.004 200);
    --bg-card:      oklch(1 0 0);
    --bg-secondary: oklch(0.965 0.006 200);
    --bg-input:     oklch(0.975 0.005 200);
    --text:         oklch(0.18 0.015 240);
    --text-muted:   oklch(0.52 0.012 240);
    --border:       oklch(0.91 0.008 200);
    --primary:      oklch(0.68 0.14 185);
    --primary-bg:   oklch(0.95 0.04 185);
    --green:        oklch(0.60 0.14 155);
    --green-bg:     oklch(0.96 0.04 155);
    --red:          oklch(0.58 0.20 28);
    --red-bg:       oklch(0.97 0.04 28);
    --amber:        oklch(0.72 0.14 70);
    --shadow:       0 1px 3px oklch(0 0 0 / 0.07), 0 4px 14px oklch(0 0 0 / 0.05);
    --shadow-hover: 0 2px 8px oklch(0 0 0 / 0.10), 0 8px 24px oklch(0 0 0 / 0.08);
    --badge-primary: var(--primary-bg);  --badge-primary-text: var(--primary);
    --badge-green:   var(--green-bg);    --badge-green-text:   var(--green);
    --badge-red:     var(--red-bg);      --badge-red-text:     var(--red);
    --badge-gray:    oklch(0.94 0.005 240); --badge-gray-text: var(--text-muted);
    --badge-amber:   oklch(0.97 0.04 70);  --badge-amber-text: var(--amber);
  }

  .dark {
    --bg:           oklch(0.13 0.012 240);
    --bg-card:      oklch(0.17 0.012 240);
    --bg-secondary: oklch(0.21 0.012 240);
    --bg-input:     oklch(0.20 0.012 240);
    --text:         oklch(0.95 0.008 200);
    --text-muted:   oklch(0.62 0.012 240);
    --border:       oklch(0.26 0.012 240);
    --primary:      oklch(0.72 0.14 185);
    --primary-bg:   oklch(0.22 0.06 185);
    --green:        oklch(0.68 0.14 155);
    --green-bg:     oklch(0.20 0.06 155);
    --red:          oklch(0.70 0.18 28);
    --red-bg:       oklch(0.22 0.06 28);
    --shadow:       0 1px 4px oklch(0 0 0 / 0.25), 0 4px 16px oklch(0 0 0 / 0.20);
    --shadow-hover: 0 2px 10px oklch(0 0 0 / 0.35), 0 8px 28px oklch(0 0 0 / 0.28);
    --badge-primary: var(--primary-bg);  --badge-primary-text: var(--primary);
    --badge-green:   var(--green-bg);    --badge-green-text:   var(--green);
    --badge-red:     var(--red-bg);      --badge-red-text:     var(--red);
    --badge-gray:    oklch(0.24 0.010 240); --badge-gray-text: var(--text-muted);
    --badge-amber:   oklch(0.24 0.06 70);  --badge-amber-text: var(--amber);
  }

  html, body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
  input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.7; }
  select option { background: var(--bg-card); color: var(--text); }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* Tweak Panel */
  #tweak-panel {
    position: fixed; bottom: 80px; right: 16px; z-index: 500;
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 18px; padding: 18px 20px; width: 260px;
    box-shadow: var(--shadow-hover);
    display: none; flex-direction: column; gap: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  #tweak-panel.open { display: flex; animation: fadeIn 0.2s ease; }
  #tweak-panel h4 { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0; }
  .tweak-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
</style>

<body>
<div id="root"></div>

<div id="tweak-panel">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <span>Demo-User</span>
    <select id="tweak-user" style="padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;">
      <option value="u1">Max (du)</option>
      <option value="u2">Sarah</option>
      <option value="u3">Julia</option>
      <option value="u4">Tom</option>
    </select>
  </div>
  <div class="tweak-row">
    <span>Primärfarbe</span>
    <div style="display:flex;gap:6px;">
      <button onclick="setPrimary('oklch(0.68 0.14 185)')" style="width:24px;height:24px;border-radius:50%;background:oklch(0.68 0.14 185);border:2px solid #fff;cursor:pointer;" title="Teal"></button>
      <button onclick="setPrimary('oklch(0.65 0.18 265)')" style="width:24px;height:24px;border-radius:50%;background:oklch(0.65 0.18 265);border:2px solid #fff;cursor:pointer;" title="Indigo"></button>
      <button onclick="setPrimary('oklch(0.62 0.22 340)')" style="width:24px;height:24px;border-radius:50%;background:oklch(0.62 0.22 340);border:2px solid #fff;cursor:pointer;" title="Pink"></button>
      <button onclick="setPrimary('oklch(0.70 0.18 70)')" style="width:24px;height:24px;border-radius:50%;background:oklch(0.70 0.18 70);border:2px solid #fff;cursor:pointer;" title="Amber"></button>
    </div>
  </div>
  <div class="tweak-row">
    <span>Schriftgröße</span>
    <input type="range" min="13" max="18" value="16" id="tweak-font" style="width:100px;" oninput="document.documentElement.style.fontSize=this.value+'px'">
  </div>
</div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "oklch(0.68 0.14 185)",
  "fontSize": 16,
  "darkMode": false
}/*EDITMODE-END*/;

// Mount app
ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider>
    <App />
  </AppProvider>
);

// Tweaks integration
window.setPrimary = (color) => {
  document.documentElement.style.setProperty('--primary', color);
  const lighter = color.replace(/0\.\d+\s+0\.\d+/, m => {
    const parts = m.split(' ');
    return `0.95 ${parseFloat(parts[1])*0.3}`;
  });
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { primaryColor: color } }, '*');
};

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweak-panel').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweak-panel').classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// Apply defaults
document.documentElement.style.fontSize = TWEAK_DEFAULTS.fontSize + 'px';
if (TWEAK_DEFAULTS.primaryColor !== 'oklch(0.68 0.14 185)') {
  document.documentElement.style.setProperty('--primary', TWEAK_DEFAULTS.primaryColor);
}
</script>
